<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-TravelClub Бронирование</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
:root { 
    --accent-orange: #ff8c00; 
    --primary-blue: #007bff;
    --success-green: #28a745;
}

body { background-color: #f3f4f6; font-family: 'Segoe UI', sans-serif; }

.orange-header {
 background-color: var(--accent-orange);
 color:white;
 padding:15px;
 text-align:center;
 font-weight:bold;
 font-size:20px;
 border-radius:12px 12px 0 0;
 text-transform:uppercase;
}

.month-btn{
 background-color:var(--primary-blue);
 color:white;
 padding:6px;
 border-radius:5px;
 font-size:11px;
 width:100%;
 cursor:pointer;
}

.calendar-grid{
 display:grid;
 grid-template-columns:repeat(7,1fr);
 gap:5px;
 text-align:center;
}

.day-cell{
 padding:10px 0;
 cursor:pointer;
 border-radius:8px;
 border:1px solid #f0f0f0;
 background:white;
}

.selected-day{
 background:var(--success-green)!important;
 color:white;
}

.activity-btn{
 background:var(--accent-orange);
 color:white;
 padding:12px;
 border-radius:8px;
 font-weight:bold;
 width:100%;
 cursor:pointer;
}

.activity-btn.active{
 background:var(--success-green);
}

.confirm-btn{
 background:var(--success-green);
 color:white;
 width:100%;
 padding:14px;
 border-radius:10px;
 font-weight:bold;
 margin-top:20px;
 cursor:pointer;
}

.voucher-box{
 border:2px dashed var(--primary-blue);
 padding:15px;
 background:white;
 border-radius:10px;
}

.hidden{display:none;}
</style>
</head>

<body class="p-4 flex justify-center">

<div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">

<div class="orange-header">БРОНИРОВАНИЕ</div>

<div id="calendar-section" class="p-5">

<p class="text-sm font-semibold mb-3">Выберите месяц и день:</p>

<div class="grid grid-cols-4 gap-2 mb-4">
<button class="month-btn" onclick="jumpToMonth(0)">Янв</button>
<button class="month-btn" onclick="jumpToMonth(1)">Фев</button>
<button class="month-btn" onclick="jumpToMonth(2)">Мар</button>
<button class="month-btn" onclick="jumpToMonth(3)">Апр</button>
<button class="month-btn" onclick="jumpToMonth(4)">Май</button>
<button class="month-btn" onclick="jumpToMonth(5)">Июн</button>
<button class="month-btn" onclick="jumpToMonth(6)">Июл</button>
<button class="month-btn" onclick="jumpToMonth(7)">Авг</button>
<button class="month-btn" onclick="jumpToMonth(8)">Сен</button>
<button class="month-btn" onclick="jumpToMonth(9)">Окт</button>
<button class="month-btn" onclick="jumpToMonth(10)">Ноя</button>
<button class="month-btn" onclick="jumpToMonth(11)">Дек</button>
</div>

<div class="flex justify-between items-center py-2 border-y mb-2">
<button onclick="changeMonth(-1)">&lt;</button>
<span id="month-year-display" class="font-bold"></span>
<button onclick="changeMonth(1)">&gt;</button>
</div>

<div class="calendar-grid text-gray-400 font-bold mb-1">
<div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
</div>

<div id="days-grid" class="calendar-grid"></div>

<p class="mt-6 mb-3 font-semibold">Время активности:</p>

<div class="grid grid-cols-2 gap-4">
<button class="activity-btn" onclick="setActivityTime('РАССВЕТ',this)">РАССВЕТ</button>
<button class="activity-btn" onclick="setActivityTime('ЗАКАТ',this)">ЗАКАТ</button>
</div>

<div id="selection-summary" class="mt-4 p-3 bg-blue-50 text-center hidden"></div>

<button onclick="openBookingForm()" class="confirm-btn">Подтвердить</button>

</div>

<div id="form-section" class="p-5 hidden">

<input type="text" id="inp-name" placeholder="Имя и Фамилия" class="w-full border p-3 rounded-lg mb-2">
<input type="text" id="inp-hotel" placeholder="Название отеля" class="w-full border p-3 rounded-lg mb-2">
<input type="text" id="inp-tg" placeholder="Ваш Telegram (@username)" class="w-full border p-3 rounded-lg mb-2">

<input type="number" id="inp-pax" placeholder="Количество человек" class="w-full border p-3 rounded-lg mb-2" oninput="updateTotal()">

<div class="text-right font-bold">
Общая сумма: <span id="total-val">0</span> $
</div>

<button onclick="finalizeBooking()" class="confirm-btn">Создать ваучер</button>

</div>

<div id="voucher-section" class="p-5 hidden">

<div class="voucher-box">

<h4 class="font-bold text-center mb-3">ОНЛАЙН ВАУЧЕР</h4>

<p><b>Номер:</b> <span id="v-id"></span></p>
<p><b>Дата/Время:</b> <span id="v-dt"></span></p>
<p><b>Клиент:</b> <span id="v-name"></span></p>
<p><b>Отель:</b> <span id="v-hotel"></span></p>
<p><b>Количество человек:</b> <span id="v-pax"></span></p>

</div>

</div>

</div>

<script>

const GOOGLE_URL="https://script.google.com/macros/s/AKfycbxg4r40tkkLQ-0QOF5Fzb54NvqVY0eo25vURQRG5w_-SJkWM3lYoIshZT5gorI6QhsAkA/exec";

const rusMonths=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];

let currentM=5;
let currentY=2026;
let selectedD=null;
let selectedT=null;

function renderDays(){

document.getElementById('month-year-display').innerText=`${rusMonths[currentM]} ${currentY}`;

const grid=document.getElementById('days-grid');
grid.innerHTML='';

let firstDay=new Date(currentY,currentM,1).getDay();
let offset=(firstDay===0)?6:firstDay-1;

for(let i=0;i<offset;i++){
grid.appendChild(document.createElement('div'));
}

const totalDays=new Date(currentY,currentM+1,0).getDate();

for(let d=1;d<=totalDays;d++){

let cell=document.createElement('div');
cell.innerText=d;
cell.className='day-cell';

cell.onclick=function(){

document.querySelectorAll('.day-cell').forEach(c=>c.classList.remove('selected-day'));
this.classList.add('selected-day');

selectedD=`${d} ${rusMonths[currentM]} ${currentY}`;

showSummary();

};

grid.appendChild(cell);
}

}

function changeMonth(dir){
currentM+=dir;

if(currentM>11){currentM=0;currentY++;}
if(currentM<0){currentM=11;currentY--;}

renderDays();
}

function jumpToMonth(m){
currentM=m;
renderDays();
}

function setActivityTime(t,b){

selectedT=t;

document.querySelectorAll('.activity-btn').forEach(btn=>btn.classList.remove('active'));

b.classList.add('active');

showSummary();
}

function showSummary(){

if(selectedD&&selectedT){

const s=document.getElementById('selection-summary');

s.classList.remove('hidden');

s.innerText=`Выбрано: ${selectedD} | ${selectedT}`;

}

}

function openBookingForm(){

if(!selectedD||!selectedT)
return alert("Выберите дату и время!");

document.getElementById('form-section').classList.remove('hidden');

}

function updateTotal(){

let pax=document.getElementById('inp-pax').value||0;

document.getElementById('total-val').innerText=pax*6;

}

async function finalizeBooking(){

const name=document.getElementById('inp-name').value;
const hotel=document.getElementById('inp-hotel').value;
const tg=document.getElementById('inp-tg').value||"-";
const pax=document.getElementById('inp-pax').value||0;

if(!name||!hotel) return alert("Введите данные!");

const vNumber="VCH-"+Math.floor(100000+Math.random()*900000);

const vDate=`${selectedD} / ${selectedT}`;

document.getElementById('v-id').innerText=vNumber;
document.getElementById('v-dt').innerText=vDate;
document.getElementById('v-name').innerText=name;
document.getElementById('v-hotel').innerText=hotel;
document.getElementById('v-pax').innerText=pax;

document.getElementById('calendar-section').classList.add('hidden');
document.getElementById('form-section').classList.add('hidden');
document.getElementById('voucher-section').classList.remove('hidden');

fetch(GOOGLE_URL,{
method:'POST',
mode:'no-cors',
body:JSON.stringify({

"Номер":vNumber,
"Услуга":"Конная прогулка",
"Дата/Время":vDate,
"Клиент":name,
"Название отеля":hotel,
"Ваш Telegram":tg,
"Количество человек":pax

})
});

}

renderDays();

</script>

</body>
</html>
