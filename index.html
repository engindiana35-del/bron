<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby792Box9crxU-8qtiOIbovNOkErFePInCRyhfDLXSERsCzCc74axU2v-rcndgYNLdWRmxLA/exec";
const rusMonths = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
let currentM = 6; let currentY = 2026; let selectedD = null; let selectedT = null;

function renderDays() {
    document.getElementById('month-year-display').innerText = `${rusMonths[currentM]} ${currentY}`;
    const grid = document.getElementById('days-grid');
    grid.innerHTML = '';
    const firstDay = new Date(currentY, currentM, 1).getDay();
    const offset = (firstDay === 0) ? 6 : firstDay - 1;
    for(let i=0; i<offset; i++) grid.innerHTML += '<div></div>';
    const totalDays = new Date(currentY, currentM+1, 0).getDate();
    for(let d=1; d<=totalDays; d++) {
        let cell = document.createElement('div');
        cell.innerText = d;
        cell.className = 'day-cell';
        cell.onclick = () => {
            document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected-day'));
            cell.classList.add('selected-day');
            selectedD = `${d} ${rusMonths[currentM]} ${currentY}`;
            showSummary();
        };
        grid.appendChild(cell);
    }
}

function changeMonth(dir) { currentM += dir; if(currentM>11){currentM=0;currentY++} if(currentM<0){currentM=11;currentY--} renderDays(); }
function jumpToMonth(m) { currentM = m; renderDays(); }
function setActivityTime(time, btn) { selectedT = time; document.querySelectorAll('.activity-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); showSummary(); }
function showSummary() { if(selectedD && selectedT) { const s = document.getElementById('selection-summary'); s.classList.remove('hidden'); s.innerText = `Выбрано: ${selectedD} | ${selectedT}`; } }
function openBookingForm() { if(!selectedD || !selectedT) return alert("Выберите дату и время!"); document.getElementById('form-section').classList.remove('hidden'); }
function updateTotal() { document.getElementById('total-val').innerText = (document.getElementById('inp-pax').value || 0) * 6; }

function finalizeBooking() {
    const data = {
        name: document.getElementById('inp-name').value,
        hotel: document.getElementById('inp-hotel').value,
        tg: document.getElementById('inp-tg').value,
        phone: document.getElementById('inp-phone').value,
        pax: document.getElementById('inp-pax').value
    };
    const amount = (document.getElementById('inp-pax').value || 0) * 6;

    if(!data.name || !data.pax) return alert("Заполните форму!");

    const voucherId = "VCH-" + Math.floor(100000 + Math.random() * 900000);

    // Google Sheets'e gönder
    fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
            voucherId: voucherId,
            datetime: `${selectedD} / ${selectedT}`,
            client: data.name,
            hotel: data.hotel,
            telegram: data.tg || "-",
            phone: data.phone,
            pax: data.pax,
            total: amount,
            status: "Beklemede"
        })
    }).then(() => console.log("Sent!"));

    // Voucher göster
    document.getElementById('v-id').innerText = voucherId;
    document.getElementById('v-dt').innerText = `${selectedD} / ${selectedT}`;
    document.getElementById('v-name').innerText = data.name;
    document.getElementById('v-hotel').innerText = data.hotel;
    document.getElementById('v-tg').innerText = data.tg || "-";
    document.getElementById('calendar-section').classList.add('hidden');
    document.getElementById('form-section').classList.add('hidden');
    document.getElementById('voucher-section').classList.remove('hidden');
}

function payWithCrypto() {
    const voucherId = document.getElementById('v-id').innerText;
    const wallet = "UQDw3BDt3lWzw5TzGLYR7hcmxD76PioJzjLTkOalXTDZ7luv";
    const amount = document.getElementById('total-val').innerText;
    const tonAmount = (parseFloat(amount) / 6).toFixed(2);

    // TONHub ödeme linki
    const payLink = `https://tonhub.com/transfer/${wallet}?amount=${tonAmount}&text=${encodeURIComponent("Voucher:" + voucherId)}`;

    // Yeni sekmede aç
    window.location.href = payLink; // window.open yerine direkt açmayı deniyoruz
}

renderDays();
</script>
