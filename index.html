<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-TravelClub Бронирование</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
:root{
--accent-orange:#ff8c00;
--primary-blue:#007bff;
--success-green:#28a745;
}

body{
background:#f3f4f6;
font-family:Segoe UI;
}

.orange-header{
background:var(--accent-orange);
color:white;
padding:15px;
text-align:center;
font-weight:bold;
font-size:20px;
border-radius:12px 12px 0 0;
}

.month-btn{
background:var(--primary-blue);
color:white;
padding:6px;
border-radius:5px;
font-size:12px;
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
text-align:center;
}

.day-cell{
padding:8px;
cursor:pointer;
border-radius:5px;
}

.day-cell:hover{
background:#e2e8f0;
}

.selected-day{
background:var(--success-green);
color:white;
}

.activity-btn{
background:var(--accent-orange);
color:white;
padding:12px;
border-radius:8px;
font-weight:bold;
}

.activity-btn.active{
background:var(--success-green);
}

.confirm-btn{
background:var(--success-green);
color:white;
width:100%;
padding:14px;
border-radius:10px;
font-weight:bold;
margin-top:20px;
}

.voucher-box{
border:2px dashed var(--primary-blue);
padding:15px;
background:white;
border-radius:10px;
}

.hidden{
display:none;
}
</style>
</head>

<body class="p-4 flex justify-center">

<div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">

<div class="orange-header">БРОНИРОВАНИЕ</div>

<div id="calendar-section" class="p-5">

<p class="text-sm font-semibold mb-3">Выберите день:</p>

<div class="flex justify-between items-center py-2 border-y mb-2">
<button onclick="changeMonth(-1)" class="text-xl">&lt;</button>
<span id="month-year-display"></span>
<button onclick="changeMonth(1)" class="text-xl">&gt;</button>
</div>

<div class="calendar-grid text-gray-400 font-bold mb-1">
<div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
</div>

<div id="days-grid" class="calendar-grid"></div>

<p class="mt-6 mb-3 font-semibold">Время:</p>

<div class="grid grid-cols-2 gap-4">

<button class="activity-btn" onclick="setActivityTime('РАССВЕТ',this)">
РАССВЕТ
</button>

<button class="activity-btn" onclick="setActivityTime('ЗАКАТ',this)">
ЗАКАТ
</button>

</div>

<div id="selection-summary" class="mt-4 text-center text-blue-800 hidden"></div>

<button onclick="openBookingForm()" class="confirm-btn">
Подтвердить
</button>

</div>

<div id="form-section" class="p-5 hidden">

<input id="inp-name" placeholder="Имя" class="w-full border p-3 rounded mb-2">

<input id="inp-hotel" placeholder="Отель" class="w-full border p-3 rounded mb-2">

<input id="inp-tg" placeholder="Telegram" class="w-full border p-3 rounded mb-2">

<input id="inp-phone" placeholder="Телефон" class="w-full border p-3 rounded mb-2">

<input id="inp-pax" type="number" placeholder="Количество человек"
class="w-full border p-3 rounded mb-2" oninput="updateTotal()">

<div class="text-xl font-bold text-right mb-3">
Total: <span id="total-val">0</span> $
</div>

<button onclick="finalizeBooking()" class="confirm-btn">
Создать ваучер
</button>

</div>

<div id="voucher-section" class="p-5 hidden">

<div class="voucher-box">

<h4 class="font-bold mb-3">ONLINE VOUCHER</h4>

<p><b>ID:</b> <span id="v-id"></span></p>
<p><b>Date:</b> <span id="v-dt"></span></p>
<p><b>Name:</b> <span id="v-name"></span></p>
<p><b>Hotel:</b> <span id="v-hotel"></span></p>
<p><b>Telegram:</b> <span id="v-tg"></span></p>

</div>

<button onclick="payWithCrypto()" class="confirm-btn">
PAY WITH CRYPTO
</button>

</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxmEsd7VVPRqc6HohudQUwGReoD8eLGQNW-1HmjxlxvIvJdbtuU2v-rcndgYNLdWRmxLA/exec";

const rusMonths=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];

let currentM=6;
let currentY=2026;

let selectedD=null;
let selectedT=null;

function renderDays(){

document.getElementById("month-year-display").innerText=
rusMonths[currentM]+" "+currentY;

const grid=document.getElementById("days-grid");

grid.innerHTML="";

const firstDay=new Date(currentY,currentM,1).getDay();

const offset=(firstDay===0)?6:firstDay-1;

for(let i=0;i<offset;i++)grid.innerHTML+="<div></div>";

const totalDays=new Date(currentY,currentM+1,0).getDate();

for(let d=1;d<=totalDays;d++){

let cell=document.createElement("div");

cell.innerText=d;

cell.className="day-cell";

cell.onclick=()=>{

document.querySelectorAll(".day-cell")
.forEach(c=>c.classList.remove("selected-day"));

cell.classList.add("selected-day");

selectedD=d+" "+rusMonths[currentM]+" "+currentY;

showSummary();

};

grid.appendChild(cell);

}

}

function changeMonth(dir){

currentM+=dir;

if(currentM>11){currentM=0;currentY++}

if(currentM<0){currentM=11;currentY--}

renderDays();

}

function setActivityTime(time,btn){

selectedT=time;

document.querySelectorAll(".activity-btn")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

showSummary();

}

function showSummary(){

if(selectedD && selectedT){

let s=document.getElementById("selection-summary");

s.classList.remove("hidden");

s.innerText="Выбрано: "+selectedD+" / "+selectedT;

}

}

function openBookingForm(){

if(!selectedD || !selectedT){

alert("Выберите дату и время");

return;

}

document.getElementById("form-section").classList.remove("hidden");

}

function updateTotal(){

let pax=document.getElementById("inp-pax").value||0;

document.getElementById("total-val").innerText=pax*6;

}

function finalizeBooking(){

let name=document.getElementById("inp-name").value;

let hotel=document.getElementById("inp-hotel").value;

let tg=document.getElementById("inp-tg").value;

let phone=document.getElementById("inp-phone").value;

let pax=document.getElementById("inp-pax").value;

if(!name)return alert("Заполните форму");

fetch(SCRIPT_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
service:"Horse Tour",
datetime:selectedD+" "+selectedT,
client:name,
hotel:hotel,
telegram:tg,
phone:phone,
count:pax
})
});

document.getElementById("v-id").innerText=
"VCH-"+Math.floor(100000+Math.random()*900000);

document.getElementById("v-dt").innerText=
selectedD+" "+selectedT;

document.getElementById("v-name").innerText=name;

document.getElementById("v-hotel").innerText=hotel;

document.getElementById("v-tg").innerText=tg||"-";

document.getElementById("calendar-section").classList.add("hidden");
document.getElementById("form-section").classList.add("hidden");
document.getElementById("voucher-section").classList.remove("hidden");

}

function payWithCrypto(){

let pax=document.getElementById("inp-pax").value||0;

let totalUSD=pax*6;

let ton=totalUSD/6;

let nano=Math.floor(ton*1000000000);

let wallet="UQDw3BDt3lWzw5TzGLYR7hcmxD76PioJzjLTkOalXTDZ7luv";

let comment="E-TravelClub Booking";

let link=
`https://tonhub.com/transfer/${wallet}?amount=${nano}&text=${encodeURIComponent(comment)}`;

window.location.href=link;

}

renderDays();

</script>

</body>
</html>
