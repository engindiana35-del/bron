<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-TravelClub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #ff8c00; --success: #28a745; }
        body { background-color: #f3f4f6; font-family: sans-serif; }
        .confirm-btn { background-color: var(--success); color: white; width: 100%; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; font-size: 16px; }
        .voucher-box { border: 2px dashed #007bff; padding: 20px; background: white; border-radius: 12px; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4">

<div id="main-app" class="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
    <div id="calendar-section" class="p-5">
        <button onclick="openBookingForm()" class="confirm-btn bg-orange-500">ЗАБРОНИРОВАТЬ</button>
    </div>

    <div id="form-section" class="p-5 hidden">
        <input type="number" id="inp-pax" value="1" class="border p-2 w-full mb-2">
        <button onclick="finalizeBooking()" class="confirm-btn">СОЗДАТЬ ВАУЧЕР</button>
    </div>

    <div id="voucher-section" class="p-5 hidden">
        <div class="voucher-box">
            <h4 class="font-bold border-b pb-2 mb-3">ОНЛАЙН ВАУЧЕР</h4>
            <div class="text-sm space-y-2">
                <p><strong>Услуга:</strong> Конная прогулка</p>
                <p><strong>ID:</strong> <span id="v-id"></span></p>
            </div>
            <div class="mt-4 text-center text-red-600 font-bold animate-pulse">ОЖIДАЕТСЯ ОПЛАТА</div>
        </div>
        
        <button id="pay-button" onclick="window.payWithCrypto()" class="confirm-btn mt-6 shadow-lg active:scale-95 transition-transform" style="background-color: #0088cc !important;">
            ОПЛАТИТЬ ЧЕРЕЗ TON
        </button>
    </div>
</div>

<script>
// Başlangıç Ayarları
if (window.Telegram && window.Telegram.WebApp) {
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();
}

function openBookingForm() {
    document.getElementById('calendar-section').classList.add('hidden');
    document.getElementById('form-section').classList.remove('hidden');
}

function finalizeBooking() {
    document.getElementById('v-id').innerText = Math.floor(100000 + Math.random() * 900000);
    document.getElementById('form-section').classList.add('hidden');
    document.getElementById('voucher-section').classList.remove('hidden');
}

// TON ÖDEME FONKSİYONU - WINDOW OBJESİNE BAĞLI
window.payWithCrypto = function() {
    console.log("Ödeme butonu tetiklendi.");
    
    let pax = document.getElementById("inp-pax").value || 1;
    let wallet = "UQDw3BDt3lWzw5TzGLYR7hcmxD76PioJzjLTkOalXTDZ7luv";
    let amountNano = Math.floor(pax * 1000000000); // 1 kişi = 1 TON
    let comment = "Tour_" + document.getElementById('v-id').innerText;
    
    let tonUrl = `ton://transfer/${wallet}?amount=${amountNano}&text=${encodeURIComponent(comment)}`;

    // Telegram içi açma denemesi
    try {
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.openLink) {
            window.Telegram.WebApp.openLink(tonUrl);
        } else {
            window.location.href = tonUrl;
        }
    } catch (e) {
        alert("Cüzdan açılamadı: " + e.message);
        window.location.href = tonUrl; // Fallback
    }
};
</script>
</body>
</html>
