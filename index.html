<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-TravelClub Бронирование</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent-orange: #ff8c00; --primary-blue: #007bff; --success-green: #28a745; }
        body { background-color: #f3f4f6; font-family: 'Segoe UI', sans-serif; }
        .orange-header { background-color: var(--accent-orange); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 20px; border-radius: 12px 12px 0 0; text-transform: uppercase; }
        .month-btn { background-color: var(--primary-blue); color: white; padding: 6px; border-radius: 5px; font-size: 12px; transition: 0.3s; width: 100%; cursor: pointer; }
        .month-btn:hover { background-color: var(--success-green); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; font-size: 14px; }
        .day-cell { padding: 8px; cursor: pointer; border-radius: 5px; transition: 0.2s; }
        .day-cell:hover { background-color: #e2e8f0; }
        .selected-day { background-color: var(--success-green) !important; color: white; }
        .activity-btn { background-color: var(--accent-orange); color: white; padding: 12px; border-radius: 8px; font-weight: bold; transition: 0.3s; border: none; width: 100%; cursor: pointer; }
        .activity-btn:hover, .activity-btn.active { background-color: var(--success-green); }
        .confirm-btn { background-color: var(--success-green); color: white; width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .voucher-box { border: 2px dashed var(--primary-blue); padding: 15px; background: white; border-radius: 10px; position: relative; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 flex justify-center">

<div id="main-app" class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
    <div class="orange-header">БРОНИРОВАНИЕ</div>

    <div id="calendar-section" class="p-5">
        <p class="text-sm font-semibold text-gray-600 mb-3">Выберите месяц и день:</p>
        <div class="grid grid-cols-4 gap-2 mb-4">
            <script>
                const months = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
                months.forEach((m, i) => document.write(`<button class="month-btn" onclick="jumpToMonth(${i})">${m}</button>`));
            </script>
        </div>
        <div class="flex justify-between items-center py-2 border-y mb-2">
            <button onclick="changeMonth(-1)" class="text-blue-600 font-bold text-xl px-2">&lt;</button>
            <span id="month-year-display" class="font-bold text-blue-900"></span>
            <button onclick="changeMonth(1)" class="text-blue-600 font-bold text-xl px-2">&gt;</button>
        </div>
        <div id="days-grid" class="calendar-grid"></div>

        <p class="text-sm font-semibold text-gray-600 mt-6 mb-3">Время активности:</p>
        <div class="grid grid-cols-2 gap-4">
            <button class="activity-btn" onclick="setActivityTime('РАССВЕТ', this)">РАССВЕТ</button>
            <button class="activity-btn" onclick="setActivityTime('ЗАКАТ', this)">ЗАКАТ</button>
        </div>
        <button onclick="openBookingForm()" class="confirm-btn uppercase">Подтвердить ✓</button>
    </div>

    <div id="form-section" class="p-5 hidden border-t">
        <h3 class="text-center font-bold text-gray-700 mb-4">Форма бронирования</h3>
        <div class="space-y-3">
            <input type="text" id="inp-name" placeholder="Имя и Фамилия" class="w-full border p-3 rounded-lg outline-none focus:border-blue-500">
            <input type="text" id="inp-hotel" placeholder="Название отеля" class="w-full border p-3 rounded-lg outline-none focus:border-blue-500">
            <input type="text" id="inp-tg" placeholder="Ваш Telegram (@username)" class="w-full border p-3 rounded-lg outline-none focus:border-blue-500">
            <input type="number" id="inp-pax" placeholder="Количество человек" class="w-full border p-3 rounded-lg outline-none focus:border-blue-500">
            <button onclick="finalizeBooking()" id="btn-submit" class="orange-header w-full rounded-lg mt-2 cursor-pointer">Создать ваучер</button>
        </div>
    </div>

    <div id="voucher-section" class="p-5 hidden">
        <div class="voucher-box">
            <h4 class="font-bold border-b pb-2 mb-3 text-gray-800 text-center">ОНЛАЙН ВАУЧЕР</h4>
            <div class="text-sm space-y-2 text-gray-700">
                <p><strong>Номер:</strong> <span id="v-id"></span></p>
                <p><strong>Клиент:</strong> <span id="v-name"></span></p>
                <p><strong>Дата/Время:</strong> <span id="v-dt"></span></p>
                <p><strong>Отель:</strong> <span id="v-hotel"></span></p>
            </div>
            <div class="mt-4 text-center text-red-600 font-bold border-t pt-2 animate-pulse">ОЖИДАЕТСЯ ОПЛАТА</div>
        </div>
        <button onclick="window.location.href='https://t.me/e_travelclub'" class="confirm-btn mt-5">Связаться в Telegram</button>
    </div>
</div>

<script>
const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxg4r40tkkLQ-0QOF5Fzb54NvqVY0eo25vURQRG5w_-SJkWM3lYoIshZT5gorI6QhsAkA/exec";

let currentM = 2, currentY = 2026, selectedD = null, selectedT = null;

function renderDays() {
    document.getElementById('month-year-display').innerText = `${months[currentM]} ${currentY}`;
    const grid = document.getElementById('days-grid'); grid.innerHTML = '';
    const totalDays = new Date(currentY, currentM + 1, 0).getDate();
    for(let d=1; d<=totalDays; d++) {
        let cell = document.createElement('div'); cell.innerText = d;
        cell.className = 'day-cell';
        cell.onclick = () => {
            document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected-day'));
            cell.classList.add('selected-day');
            selectedD = `${d} ${months[currentM]} ${currentY}`;
        };
        grid.appendChild(cell);
    }
}

function changeMonth(dir) { currentM += dir; if(currentM>11){currentM=0;currentY++} if(currentM<0){currentM=11;currentY--} renderDays(); }
function jumpToMonth(m) { currentM = m; renderDays(); }
function setActivityTime(t, b) { selectedT = t; document.querySelectorAll('.activity-btn').forEach(btn=>btn.classList.remove('active')); b.classList.add('active'); }
function openBookingForm() { if(!selectedD || !selectedT) return alert("Выберите дату ve время!"); document.getElementById('form-section').classList.remove('hidden'); }

async function finalizeBooking() {
    const name = document.getElementById('inp-name').value;
    const hotel = document.getElementById('inp-hotel').value;
    const tg = document.getElementById('inp-tg').value;
    if(!name || !hotel) return alert("Заполните поля!");

    const vNumber = "VCH-" + Math.floor(100000 + Math.random() * 900000);
    const vDate = `${selectedD} / ${selectedT}`;

    document.getElementById('v-id').innerText = vNumber;
    document.getElementById('v-name').innerText = name;
    document.getElementById('v-dt').innerText = vDate;
    document.getElementById('v-hotel').innerText = hotel;
    document.getElementById('calendar-section').classList.add('hidden');
    document.getElementById('form-section').classList.add('hidden');
    document.getElementById('voucher-section').classList.remove('hidden');

    fetch(GOOGLE_URL, {
        method: 'POST',
        mode: 'no-cors', 
        body: JSON.stringify({
            "Номер": vNumber,
            "Услуга": "Конная прогулка",
            "Дата/Время": vDate,
            "Клиент": name,
            "Название отеля": hotel,
            "Ваш Telegram": tg || "-"
        })
    });
}
renderDays();
</script>
</body>
</html>
