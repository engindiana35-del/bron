<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Бронирование</title>

<style>
body{
font-family: Arial;
background:#eef2f6;
display:flex;
justify-content:center;
padding:30px;
}

.card{
background:white;
width:420px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
padding:15px;
}

.header{
background:linear-gradient(#3c7bd6,#2a5fa8);
color:white;
padding:12px;
border-radius:10px;
text-align:center;
font-weight:bold;
}

.months{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin:15px 0;
}

.month{
background:#3c7bd6;
color:white;
padding:8px;
border-radius:6px;
text-align:center;
cursor:pointer;
}

.calendar-header{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0;
font-weight:bold;
}

.arrow{
cursor:pointer;
font-size:18px;
}

.days{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.day{
padding:10px;
text-align:center;
border-radius:6px;
cursor:pointer;
}

.day:hover{
background:#dbe7ff;
}

.selected{
background:#28a745;
color:white;
}

.times{
margin-top:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.time{
background:#3c7bd6;
color:white;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
}

.time.selected{
background:#28a745;
}

.confirm{
margin-top:15px;
background:#28a745;
color:white;
padding:12px;
border-radius:8px;
text-align:center;
cursor:pointer;
font-weight:bold;
}

.form{
display:none;
margin-top:15px;
}

input{
width:100%;
padding:8px;
margin:6px 0;
}

.result{
font-weight:bold;
margin-top:8px;
color:#2a5fa8;
}
</style>
</head>

<body>

<div class="card">

<div class="header">📅 Бронирование</div>

<div class="months" id="months"></div>

<div class="calendar-header">
<span class="arrow" onclick="changeMonth(-1)">◀</span>
<span id="currentMonth"></span>
<span class="arrow" onclick="changeMonth(1)">▶</span>
</div>

<div class="days" id="days"></div>

<h4 style="text-align:center">Выберите время активности:</h4>

<div class="times">
<div class="time">🌅 Рассвет</div>
<div class="time">🌇 Закат</div>
</div>

<div class="confirm" onclick="confirmBooking()">✅ Я подтверждаю</div>

<div id="selectedInfo"></div>

<div class="form" id="form">
<h3>Форма бронирования</h3>

<input placeholder="Имя и фамилия">
<input placeholder="Телефон">

<input placeholder="Отель / Адрес проживания">

<input type="number" id="people" placeholder="Количество человек">

<div class="result" id="price"></div>

</div>

</div>

<script>

const monthsRus=[
"Январь","Февраль","Март","Апрель",
"Май","Июнь","Июль","Август",
"Сентябрь","Октябрь","Ноябрь","Декабрь"
];

let currentMonthIndex=new Date().getMonth();
let selectedDay=null;
let selectedTime=null;

const monthsDiv=document.getElementById("months");
monthsRus.forEach((m,i)=>{
let div=document.createElement("div");
div.className="month";
div.innerText=m;
div.onclick=()=>{currentMonthIndex=i; renderCalendar();}
monthsDiv.appendChild(div);
});

function renderCalendar(){
document.getElementById("currentMonth").innerText=
monthsRus[currentMonthIndex]+" 2026";

const daysDiv=document.getElementById("days");
daysDiv.innerHTML="";

for(let i=1;i<=31;i++){
let d=document.createElement("div");
d.className="day";
d.innerText=i;

d.onclick=()=>{
document.querySelectorAll(".day").forEach(el=>el.classList.remove("selected"));
d.classList.add("selected");
selectedDay=i;
};

daysDiv.appendChild(d);
}
}

function changeMonth(step){
currentMonthIndex+=step;
if(currentMonthIndex<0) currentMonthIndex=11;
if(currentMonthIndex>11) currentMonthIndex=0;
renderCalendar();
}

document.querySelectorAll(".time").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".time").forEach(t=>t.classList.remove("selected"));
btn.classList.add("selected");
selectedTime=btn.innerText;
};
});

function confirmBooking(){
if(!selectedDay || !selectedTime){
alert("Дата и время не выбраны!");
return;
}

document.getElementById("selectedInfo").innerHTML=
`Вы выбрали: <b>${selectedDay} ${monthsRus[currentMonthIndex]}</b> — <b>${selectedTime}</b>`;

document.getElementById("form").style.display="block";
}

document.getElementById("people").addEventListener("input",function(){
let total=this.value*6;
document.getElementById("price").innerText=
"Сумма к оплате: "+total+" $";
});

renderCalendar();

</script>
</body>
</html>
