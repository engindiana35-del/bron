<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Demo</title>
<style>
body{font-family:sans-serif;padding:20px;}
.orange-header{background:#ff8c00;color:white;padding:10px;text-align:center;font-weight:bold;}
</style>
</head>
<body>

<div class="orange-header" id="activity-title">БРОНИРОВАНИЕ</div>

<p>Выбрано: <span id="selected-activity">---</span></p>

<button onclick="createVoucher()">Создать ваучер</button>

<div id="voucher" style="margin-top:20px; display:none; border:1px dashed #007bff; padding:10px;">
<h4>ОНЛАЙН ВАУЧЕР</h4>
<p>Услуга: <span id="v-act"></span></p>
</div>

<script>
// Sözlük: Telegram link parametre => Voucher adı
const activityDictionary = {
  "kapadokya_blue_tour": "Синий тур",
  "kapadokya_red_tour": "Красный тур",
  "kapadokya_green_tour": "Зеленый тур",
  "at_turu": "Конная прогулка"
};

// Telegram deeplink'ten start parametresini oku
const urlParams = new URLSearchParams(window.location.search);
const rawStart = urlParams.get('start') || "at_turu";

// Voucher aktivite adını sözlükten al
const activityFromUrl = activityDictionary[rawStart] || rawStart.replace(/_/g,' ');

// Başlık ve seçilen aktivite alanına yaz
document.getElementById('activity-title').innerText = activityFromUrl.toUpperCase();
document.getElementById('selected-activity').innerText = activityFromUrl;

function createVoucher(){
    document.getElementById('v-act').innerText = activityFromUrl;
    document.getElementById('voucher').style.display = 'block';
}
</script>

</body>
</html>
