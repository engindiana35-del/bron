<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-TravelClub Бронирование</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --accent-orange: #ff8c00; 
            --primary-blue: #007bff;
            --success-green: #28a745;
        }
        body { background-color: #f3f4f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .orange-header { background-color: var(--accent-orange); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 20px; border-radius: 12px 12px 0 0; text-transform: uppercase; }
        .month-btn { background-color: var(--primary-blue); color: white; padding: 8px 4px; border-radius: 6px; font-size: 11px; font-weight: 600; transition: 0.3s; width: 100%; cursor: pointer; border: none; }
        .month-btn:hover { background-color: var(--success-green); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .day-cell { 
            padding: 10px 0; 
            cursor: pointer; 
            border-radius: 8px; 
            background-color: white; 
            color: #333; 
            font-weight: 600;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }
        .day-cell:hover { background-color: #edf2f7; border-color: var(--primary-blue); }
        .selected-day { background-color: var(--success-green) !important; color: white !important; border-color: var(--success-green); }
        .activity-btn { background-color: var(--accent-orange); color: white; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; border: none; }
        .activity-btn.active { background-color: var(--success-green); }
        .confirm-btn { background-color: var(--success-green); color: white; width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; border: none; }
        .voucher-box { border: 2px dashed var(--primary-blue); padding: 15px; background: white; border-radius: 10px; position: relative; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 flex justify-center">

<div id="main-app" class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
    <div class="orange-header">БРОНИРОВАНИЕ</div>

    <div id="calendar-section" class="p-5">
