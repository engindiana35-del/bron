<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-TravelClub Бронирование</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent-orange: #ff8c00; --primary-blue: #007bff; --success-green: #28a745; }
        body { background-color: #f3f4f6; font-family: 'Segoe UI', sans-serif; }
        .orange-header { background-color: var(--accent-orange); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 20px; border-radius: 12px 12px 0 0; text-transform: uppercase; }
        .month-btn { background-color: var(--primary-blue); color: white; padding: 6px; border-radius: 5px; font-size: 12px; transition: 0.3s; width: 100%; cursor: pointer; }
        .month-btn:hover { background-color: var(--success-green); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; font-size: 14px; }
        .day-cell { padding: 8px; cursor: pointer; border-radius: 5px; transition: 0.2s; }
        .day-cell:hover { background-color: #e2e8f0; }
        .selected-day { background-color: var(--success-green) !important; color: white; }
        .activity-btn { background-color: var(--accent-orange); color: white; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .activity-btn.active { background-color: var(--success-green); }
        .confirm-btn { background-color: var(--success-green); color: white; width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .voucher-box { border: 2px dashed var(--primary-blue); padding: 15px; background: white; border-radius: 10px; position: relative; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 flex justify-center">

<div id="main-app" class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
    <div class="orange-header">БРОНИРОВАНИЕ</div>

    <div id="calendar-section" class="p-5">
        <p class="text-sm font-semibold text-gray-600 mb-3">Выберите месяц и день:</p>
        <div class="grid grid-cols-4 gap-2 mb-4">
            <button class="month-btn" onclick="jumpToMonth(0)">Янв</button>
            <button class="month-btn" onclick="jumpToMonth(1)">Фев</button>
            <button class="month-btn" onclick="jumpToMonth(2)">Мар</button>
            <button class="month-btn" onclick="jumpToMonth(3)">Апр</button>
            <button class="month-btn" onclick="jumpToMonth(4)">Май</button>
            <button class="month-btn" onclick="jumpToMonth(5)">Июн</button>
            <button class="month-btn" onclick="jumpToMonth(6)">Июл</button>
            <button class="month-btn" onclick="jumpToMonth(7)">Авг</button>
        </div>

        <div class="flex justify-between items-center py-2 border-y mb-2">
            <button onclick="changeMonth(-1)" class="font-bold text-xl px-2"> &lt; </button>
            <span id="month-year-display" class="font-bold text-blue-900"></span>
            <button onclick="changeMonth(1)" class="font-bold text-xl px-2"> &gt; </button>
        </div>

        <div class="calendar-grid text-gray-400 font-bold mb-1">
            <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
        </div>
        <div id="days-grid" class="calendar-grid"></div>

        <p class="text-sm font-semibold text-gray-600 mt-6 mb-3">Время активности:</p>
        <div class="grid grid-cols-2 gap-4">
            <button class="activity-btn" onclick="setActivityTime('РАССВЕТ', this)">РАССВЕТ</button>
            <button class="activity-btn" onclick="setActivityTime('ЗАКАТ', this)">ЗАКАТ</button>
        </div>

        <div id="selection-summary" class="mt-4 p-3 bg-blue-50 text-blue-800 text-sm rounded-lg hidden text-center"></div>
        <button onclick="openBookingForm()" class="confirm-btn uppercase">Подтвердить ✓</button>
    </div>

        <h3 class="text-center font-bold text-gray-700 mb-4">Форма бронирования</h3>
        <div class="space-y-3">
            <input type="text" id="inp-name" placeholder="Имя и Фамилия" class="w-full border p-3 rounded-lg outline-none">
