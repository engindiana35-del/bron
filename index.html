<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-TravelClub Бронирование</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --accent-orange: #ff8c00; 
            --primary-blue: #007bff;
            --success-green: #28a745;
        }
        body { background-color: #f3f4f6; font-family: 'Segoe UI', sans-serif; }
        .orange-header { background-color: var(--accent-orange); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 20px; border-radius: 12px 12px 0 0; text-transform: uppercase; }
        .month-btn { background-color: var(--primary-blue); color: white; padding: 6px; border-radius: 5px; font-size: 12px; transition: 0.3s; width: 100%; cursor: pointer; border: none; }
        .month-btn:hover { background-color: var(--success-green); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; font-size: 14px; }
        .day-cell { padding: 8px; cursor: pointer; border-radius: 5px; transition: 0.2s; background: #fff; }
        .day-cell:hover { background-color: #e2e8f0; }
        .selected-day { background-color: var(--success-green) !important; color: white; }
        .activity-btn { background-color: var(--accent-orange); color: white; padding: 12px; border-radius: 8px; font-weight: bold; transition: 0.3s; width: 100%; cursor: pointer; }
        .activity-btn.active { background-color: var(--success-green); }
        .confirm-btn { background-color: var(--success-green); color: white; width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; border: none; }
        .voucher-box { border: 2px dashed var(--primary-blue); padding: 15px; background: white; border-radius: 10px; position: relative; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 flex justify-center">

<div id="main-app" class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
    <div class="orange-header">БРОНИРОВАНИЕ</div>

    <div id="calendar-section" class="p-5">
        <p class="text-sm font-semibold text-gray-600 mb-3 text-center">Выберите месяц и день:</p>
        <div class="grid grid-cols-4 gap-2 mb-4">
            <button class="month-btn" onclick="jumpToMonth(4)">Май</button>
            <button class="month-btn" onclick="jumpToMonth(5)">Июнь</button>
            <button class="month-btn" onclick="jumpToMonth(6)">Июль</button>
            <button class="month-btn" onclick="jumpToMonth(7)">Август</button>
        </div>

        <div class="flex justify-between items-center py-2 border-y mb-2">
            <button onclick="changeMonth(-1)" class="text-blue-600 font-bold text-xl px-2">&lt;</button>
            <span id="month-year-display" class="font-bold text-blue-900">Июль 2026</span>
            <button onclick="changeMonth(1)" class="text-blue-600 font-bold text-xl px-2">&gt;</button>
        </div>

        <div class="calendar-grid text-gray-400 font-bold mb-1">
            <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
        </div>
        <div id="days-grid" class="calendar-grid"></div>

        <p class="text-sm font-semibold text-gray-600 mt-6 mb-3 text-center">Время активности:</p>
        <div class="grid grid-cols-2 gap-4">
            <button class="activity-btn" onclick="setActivityTime('РАССВЕТ', this)">РАССВЕТ</button>
            <button class="activity-btn" onclick="setActivityTime('ЗАКАТ', this)">ЗАКАТ</button>
        </div>

        <div id="selection-summary" class="mt-4 p-3 bg-blue-50 text-blue-800 text-sm rounded-lg hidden text-center"></div>
        <button onclick="openBookingForm()" class="confirm-btn uppercase">Подтвердить ✓</button>
    </div>

    <div id="form-section" class="p-5 hidden border-t">
        <h3 class="text-center font-bold text-gray-700 mb-4 uppercase">Данные для ваучера</h3>
        <div class="space-y-3">
            <input type="text" id="inp-name" placeholder="Имя и Фамилия" class="w-full border p-3 rounded-lg outline-none focus:border-blue-500">
            <input type="text" id="inp-hotel" placeholder="Название отеля / Адрес" class="w-full border p-3 rounded-lg outline-none focus:border-blue-500">
            <input type="text" id="inp-tg" placeholder="Ваш Telegram (@username)" class="w-full border p-3 rounded-lg outline-none focus:border-blue-500">
            <input type="tel" id="inp-phone" placeholder="Контактный номер" class="w-full border p-3 rounded-lg outline-none focus:border-blue-500">
            <input type="number" id="inp-pax" placeholder="Количество человек" class="w-full border p-3 rounded-lg outline-none focus:border-blue-500" oninput="updateTotal()">
            
            <div class="text-xl font-bold text-right text-blue-900 border-t pt-2">
                Сбор за консультацию: <span id="total-val">0</span> $
            </div>

            <button onclick="finalizeBooking()" class="orange-header w-full rounded-lg mt-2 cursor-pointer border-none">Создать ваучер</button>
        </div>
    </div>

    <div id="voucher-section" class="p-5 hidden">
        <div class="voucher-box">
            <div class="absolute top-2 right-2 text-blue-600 font-black text-xs">E-TRAVELCLUB</div>
            <h4 class="font-bold border-b pb-2 mb-3 text-gray-800">ОНЛАЙН ВАУЧЕР</h4>
            <div class="text-sm space-y-2 text-gray-700">
                <p><strong>Номер:</strong> <span id="v-id"></span></p>
                <p><strong>Услуга:</strong> Конная прогулка</p>
                <p><strong>Дата/Время:</strong> <span id="v-dt"></span></p>
                <p><strong>Клиент:</strong> <span id="v-name"></span></p>
                <p><strong>Отель:</strong> <span id="v-hotel"></span></p>
                <p><strong>Telegram:</strong> <span id="v-tg"></span></p>
            </div>
            <div class="mt-4 text-center text-red-600 font-bold border-t pt-2 animate-pulse uppercase">ОЖИДАЕТСЯ ОПЛАТА</div>
        </div>
        <button onclick="payWithCrypto()" class="confirm-btn mt-5 uppercase">Оплатить через Crypto (TON/USDT)</button>
    </div>
</div>

<script>
// --- AYARLAR ---
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxmEsd7VVPRqc6HohudQUwGReoD8eLGQNW-1HmjxlxvIvJdbtuU2v-rcndgYNLdWRmxLA/exec";
const MY_WALLET = "UQDw3BDt3lWzw5TzGLYR7hcmxD76PioJzjLTkOalXTDZ7luv";

const rusMonths = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
let currentM = 6; let currentY = 2026; let selectedD = null; let selectedT = null;

function renderDays() {
    document.getElementById('month-year-display').innerText = `${rusMonths[currentM]} ${currentY}`;
    const grid = document.getElementById('days-grid');
    grid.innerHTML = '';
    const firstDay = new Date(currentY, currentM, 1).getDay();
    const offset = (firstDay === 0) ? 6 : firstDay - 1;
    for(let i=0; i<offset; i++) grid.innerHTML += '<div></div>';
    const totalDays = new Date(currentY, currentM+1, 0).getDate();
    for(let d=1; d<=totalDays; d++) {
        let cell = document.createElement('div');
        cell.innerText = d;
        cell.className = 'day-cell';
        cell.onclick = () => {
            document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected-day'));
            cell.classList.add('selected-day');
            selectedD = `${d} ${rusMonths[currentM]} ${currentY}`;
            showSummary();
        };
        grid.appendChild(cell);
    }
}

function changeMonth(dir) { currentM += dir; if(currentM>11){currentM=0;currentY++} if(currentM<0){currentM=11;currentY--} renderDays(); }
function jumpToMonth(m) { currentM = m; renderDays(); }
function setActivityTime(time, btn) { selectedT = time; document.querySelectorAll('.activity-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); showSummary(); }
function showSummary() { if(selectedD && selectedT) { const s = document.getElementById('selection-summary'); s.classList.remove('hidden'); s.innerText = `Выбрано: ${selectedD} | ${selectedT}`; } }
function openBookingForm() { if(!selectedD || !selectedT) return alert("Выберите дату и время!"); document.getElementById('form-section').classList.remove('hidden'); }
function updateTotal() { document.getElementById('total-val').innerText = (document.getElementById('inp-pax').value || 0) * 6; }

function finalizeBooking() {
    const data = {
        name: document.getElementById('inp-name').value,
        hotel: document.getElementById('inp-hotel').value,
        tg: document.getElementById('inp-tg').value,
        phone: document.getElementById('inp-phone').value,
        pax: document.getElementById('inp-pax').value
    };

    if(!data.name || !data.pax) return alert("Заполните имя и количество человек!");

    const vID = "VCH-" + Math.floor(100000 + Math.random() * 900000);

    // GOOGLE SHEETS'E GÖNDERME
    fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
            service: "Конная прогулка",
            datetime: `${selectedD} / ${selectedT}`,
            client: data.name,
            hotel: data.hotel,
            telegram: data.tg,
            phone: data.phone,
            count: data.pax,
            voucherId: vID
        })
    });

    // VOUCHER GÖSTERME
    document.getElementById('v-id').innerText = vID;
    document.getElementById('v-dt').innerText = `${selectedD} / ${selectedT}`;
    document.getElementById('v-name').innerText = data.name;
    document.getElementById('v-hotel').innerText = data.hotel;
    document.getElementById('v-tg').innerText = data.tg || "-";

    document.getElementById('calendar-section').classList.add('hidden');
    document.getElementById('form-section').classList.add('hidden');
    document.getElementById('voucher-section').classList.remove('hidden');
}

function payWithCrypto() {
    const amount = document.getElementById('total-val').innerText;
    const vID = document.getElementById('v-id').innerText;
    
    navigator.clipboard.writeText(MY_WALLET).then(() => {
        alert("Адрес скопирован: " + MY_WALLET + "\nСумма: " + amount + "$\n\nПосле нажатия OK откроется кошелек.");
        
        // Evrensel TON linki - Cüzdanı otomatik tetikler
        const
